kind = "web"
previewPath = "/"
title = "Carters Care Group"
version = "1.0.0"
id = "artifacts/carters-care-group"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22793

[services.development]
run = "pnpm --filter @workspace/carters-care-group run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/carters-care-group", "run", "build" ]
publicDir = "artifacts/carters-care-group/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22793"
BASE_PATH = "/"
